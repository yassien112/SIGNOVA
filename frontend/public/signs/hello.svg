<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 140">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
  </defs>
  <rect width="220" height="140" rx="24" fill="url(#bg)" />
  <g fill="#bfdbfe">
    <circle cx="58" cy="62" r="18">
      <animate attributeName="cy" values="62;52;62" dur="1.4s" repeatCount="indefinite" />
    </circle>
    <circle cx="84" cy="44" r="8" opacity="0.85">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite" />
    </circle>
    <circle cx="98" cy="62" r="6" opacity="0.65">
      <animate attributeName="opacity" values="1;0.35;1" dur="1.1s" repeatCount="indefinite" />
    </circle>
  </g>
  <text x="24" y="28" fill="#dbeafe" font-size="11" font-family="Segoe UI, Arial, sans-serif" letter-spacing="2">VOICE TO SIGN</text>
  <text x="24" y="118" fill="#f8fafc" font-size="28" font-weight="700" font-family="Segoe UI, Arial, sans-serif">HELLO</text>
</svg>
